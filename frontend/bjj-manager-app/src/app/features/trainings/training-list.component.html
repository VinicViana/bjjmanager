<div class="page-header">
  <h1>Training Sessions</h1>
  <a mat-flat-button color="primary" routerLink="/trainings/new">New Training</a>
</div>

<form [formGroup]="filterForm" (ngSubmit)="load()" class="filter-form">
  <mat-form-field appearance="outline">
    <mat-label>Exact date</mat-label>
    <input matInput [matDatepicker]="filterDatePicker" formControlName="date" />
    <mat-datepicker-toggle matIconSuffix [for]="filterDatePicker"></mat-datepicker-toggle>
    <mat-datepicker #filterDatePicker></mat-datepicker>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Month</mat-label>
    <input matInput type="number" min="1" max="12" formControlName="month" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Year</mat-label>
    <input matInput type="number" formControlName="year" />
  </mat-form-field>

  <button mat-stroked-button type="submit">Filter</button>
  <button mat-button type="button" (click)="clearFilters()">Clear</button>
</form>

@if (trainings().length > 0) {
<div class="table-card">
<div class="table-responsive">
<table mat-table [dataSource]="trainings()" class="full-width">
  <ng-container matColumnDef="trainingDate">
    <th mat-header-cell *matHeaderCellDef>Date</th>
    <td mat-cell *matCellDef="let t">{{ t.trainingDate | date: 'mediumDate' }}</td>
  </ng-container>

  <ng-container matColumnDef="academyName">
    <th mat-header-cell *matHeaderCellDef>Academy</th>
    <td mat-cell *matCellDef="let t">{{ t.academyName }}</td>
  </ng-container>

  <ng-container matColumnDef="selfEvaluation">
    <th mat-header-cell *matHeaderCellDef>Self Evaluation</th>
    <td mat-cell *matCellDef="let t">
      <span class="eval-chip" [ngClass]="'eval-' + t.selfEvaluation">{{ evaluationLabel(t.selfEvaluation) }}</span>
    </td>
  </ng-container>

  <ng-container matColumnDef="notes">
    <th mat-header-cell *matHeaderCellDef>Notes</th>
    <td mat-cell *matCellDef="let t" class="notes-cell">{{ t.notes }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let t">
      <a mat-icon-button [routerLink]="['/trainings', t.id, 'edit']" aria-label="Edit">
        <mat-icon>edit</mat-icon>
      </a>
      <button mat-icon-button (click)="remove(t.id)" aria-label="Delete">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
</div>
</div>
} @else {
  <p class="empty-state">
    <mat-icon>fitness_center</mat-icon><br />
    No training sessions yet.
  </p>
}
