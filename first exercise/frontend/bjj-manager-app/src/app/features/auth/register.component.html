<div class="auth-page">
  <mat-card class="auth-card">
    <div class="auth-logo">
      <mat-icon>sports_kabaddi</mat-icon>
    </div>
    <mat-card-title>Create your account</mat-card-title>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" />
          @if (form.controls.password.hasError('minlength')) {
            <mat-hint>At least 6 characters.</mat-hint>
          }
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" [disabled]="submitting()" class="full-width">
          Register
        </button>
      </form>

      <p class="switch-link">Already have an account? <a routerLink="/login">Login</a></p>
    </mat-card-content>
  </mat-card>
</div>
